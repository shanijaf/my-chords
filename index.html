<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTheory Pro | Ultimate Tuning Lab</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #141417;
            --accent: #00f2ff;
            --text: #ffffff;
            --fret: #27272a;
            --string: #3f3f46;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
            line-height: 1.5;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; letter-spacing: 6px; margin: 0; font-weight: 200; }
        .header h1 span { color: var(--accent); font-weight: 900; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
        }

        .dashboard {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #25252a;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .chord-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color: #000;
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        select, button {
            background: #1c1c21;
            color: white;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            outline: none;
        }

        optgroup { background: #1c1c21; color: var(--accent); font-style: normal; }

        .fretboard-wrap {
            width: 100%;
            margin-top: 30px;
            background: #0d0d0f;
            padding: 50px 20px;
            border-radius: 24px;
            border: 1px solid #222;
            overflow-x: auto;
        }

        svg { width: 100%; height: auto; min-width: 1000px; }
        .finger-text { font-size: 10px; font-weight: 900; text-anchor: middle; fill: #fff; }
        .mute-text { font-size: 12px; font-weight: bold; text-anchor: middle; fill: #ef4444; }
        .open-circle { fill: none; stroke: #000; stroke-width: 1.5; }
        .note-text { font-size: 10px; font-weight: 900; text-anchor: middle; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STRING<span>THEORY</span></h1>
        <p style="color: #71717a; font-size: 0.9rem;">The Ultimate Alternate Tuning Engine</p>
    </div>

    <div class="main-layout">
        <div class="dashboard">
            <div class="control-group">
                <label>Tuning Selection</label>
                <select id="tuningSelect">
                    <optgroup label="Standard & Drop">
                        <option value="E2,A2,D3,G3,B3,E4">Standard E</option>
                        <option value="Eb2,Ab2,Db3,Gb3,Bb3,Eb4">Eb Standard</option>
                        <option value="D2,A2,D3,G3,B3,E4">Drop D</option>
                        <option value="C2,G2,C3,F3,A3,D4">Drop C</option>
                        <option value="B1,F#2,B2,E3,G#3,C#4">Drop B</option>
                    </optgroup>
                    <optgroup label="Open Tunings">
                        <option value="D2,A2,D3,F#3,A3,D4">Open D</option>
                        <option value="E2,B2,E3,G#3,B3,E4">Open E</option>
                        <option value="D2,G2,D3,G3,B3,D4">Open G</option>
                        <option value="C2,G2,C3,G3,C4,E4">Open C</option>
                        <option value="A1,E2,A2,E3,A3,C#4">Open A</option>
                    </optgroup>
                    <optgroup label="Modal & Exotic">
                        <option value="D2,A2,D3,G3,A3,D4">DADGAD (Celtic)</option>
                        <option value="D2,G2,D3,G3,C4,D4">Orkney</option>
                        <option value="C2,G2,D3,G3,A3,D4">New Standard (Fripp)</option>
                        <option value="E2,A2,D3,G3,B3,D4">Standard / D6</option>
                    </optgroup>
                    <optgroup label="Extended Range">
                        <option value="B1,E2,A2,D3,G3,B3,E4">7-String Standard</option>
                        <option value="A1,D2,G2,C3,F3,A3,D4">7-String Drop A</option>
                        <option value="F#1,B1,E2,A2,D3,G3,B3,E4">8-String Standard</option>
                    </optgroup>
                </select>
            </div>
            <div class="control-group">
                <label>Key</label>
                <select id="rootSelect"></select>
            </div>
            <div class="control-group">
                <label>Chord Structure</label>
                <select id="typeSelect"></select>
            </div>
            <div class="control-group" style="grid-column: span 2;">
                <label>&nbsp;</label>
                <button id="playBtn" style="background: var(--accent); color: #000; width: 100%;">ARPEGGIATE HARMONY</button>
            </div>
        </div>

        <div class="chord-card">
            <div id="chordTitle" style="font-weight: 900; margin-bottom: 10px;">C Maj</div>
            <svg id="chordBox" width="160" height="180" viewBox="0 0 100 120"></svg>
            <div id="tuningLabel" style="font-size: 9px; margin-top: 10px; font-weight: bold; letter-spacing: 1px;">E A D G B E</div>
        </div>
    </div>

    <div class="fretboard-wrap">
        <svg id="fretboard" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CHORDS = {
            "Major": [0, 4, 7], "Minor": [0, 3, 7], "Dom 7": [0, 4, 7, 10],
            "Maj 7": [0, 4, 7, 11], "Sus2": [0, 2, 7], "Sus4": [0, 5, 7], "9th": [0, 4, 7, 10, 14]
        };

        const tuningSel = document.getElementById('tuningSelect');
        const rootSel = document.getElementById('rootSelect');
        const typeSel = document.getElementById('typeSelect');
        const fretboard = document.getElementById('fretboard');
        const chordBox = document.getElementById('chordBox');

        function init() {
            NOTES.forEach(n => rootSel.add(new Option(n, n)));
            Object.keys(CHORDS).forEach(k => typeSel.add(new Option(k, k)));
            rootSel.value = "G";
            render();
        }

        function render() {
            const tuning = tuningSel.value.split(',').reverse();
            const root = rootSel.value;
            const type = typeSel.value;
            const targetNotes = CHORDS[type].map(i => NOTES[(NOTES.indexOf(root) + i) % 12]);
            
            // Update Text UI
            document.getElementById('chordTitle').innerText = `${root} ${type}`;
            document.getElementById('tuningLabel').innerText = tuning.map(n => n.replace(/[0-9]/g, '')).reverse().join(' ');

            drawFretboard(tuning, root, targetNotes);
            drawChordBox(tuning, root, targetNotes);
        }

        function drawChordBox(tuning, root, targets) {
            chordBox.innerHTML = '';
            // Basic Grid
            for(let i=0; i<6; i++) {
                let x = 15 + i*14;
                let s = document.createElementNS("http://www.w3.org/2000/svg", "line");
                s.setAttribute("x1", x); s.setAttribute("y1", 20); s.setAttribute("x2", x); s.setAttribute("y2", 100);
                s.setAttribute("stroke", "#ddd"); chordBox.appendChild(s);
            }
            for(let i=0; i<6; i++) {
                let y = 20 + i*16;
                let f = document.createElementNS("http://www.w3.org/2000/svg", "line");
                f.setAttribute("x1", 15); f.setAttribute("y1", y); f.setAttribute("x2", 85); f.setAttribute("y2", y);
                f.setAttribute("stroke", "#000"); f.setAttribute("stroke-width", i===0?4:1);
                chordBox.appendChild(f);
            }

            // Simple Smart Fingering (Looks for first available target notes on each string)
            tuning.slice(0, 6).forEach((sNote, sIdx) => {
                let x = 15 + sIdx*14;
                let startIdx = NOTES.indexOf(sNote.replace(/[0-9]/g, ''));
                let found = false;

                for(let f=0; f<=4; f++) {
                    if(found) break;
                    let note = NOTES[(startIdx + f) % 12];
                    if(targets.includes(note)) {
                        if(f === 0) {
                            let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                            c.setAttribute("cx", x); c.setAttribute("cy", 12); c.setAttribute("r", 3);
                            c.setAttribute("class", "open-circle"); chordBox.appendChild(c);
                        } else {
                            let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                            dot.setAttribute("cx", x); dot.setAttribute("cy", 20 + f*16 - 8);
                            dot.setAttribute("r", 5); dot.setAttribute("fill", note===root ? "var(--accent)" : "#000");
                            chordBox.appendChild(dot);
                        }
                        found = true;
                    }
                }
                if(!found) {
                    let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", x); t.setAttribute("y", 15); t.setAttribute("class", "mute-text");
                    t.textContent = "×"; chordBox.appendChild(t);
                }
            });
        }

        function drawFretboard(tuning, root, targets) {
            fretboard.innerHTML = '';
            const numStrings = tuning.length;
            const height = numStrings * 25 + 40;
            fretboard.setAttribute("viewBox", `0 0 1000 ${height}`);

            for(let f=0; f<=15; f++) {
                let x = f*60 + 60;
                let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", x); l.setAttribute("y1", 20); l.setAttribute("x2", x); l.setAttribute("y2", height-20);
                l.setAttribute("stroke", f===0?"#fff":"var(--fret)"); l.setAttribute("stroke-width", f===0?4:1);
                fretboard.appendChild(l);
            }

            tuning.forEach((sNote, sIdx) => {
                let y = sIdx * 25 + 30;
                let sLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                sLine.setAttribute("x1", 60); sLine.setAttribute("y1", y); sLine.setAttribute("x2", 960); sLine.setAttribute("y2", y);
                sLine.setAttribute("stroke", "var(--string)"); fretboard.appendChild(sLine);

                let startIdx = NOTES.indexOf(sNote.replace(/[0-9]/g, ''));
                for(let f=0; f<=15; f++) {
                    let note = NOTES[(startIdx + f) % 12];
                    if(targets.includes(note)) {
                        let isRoot = note === root;
                        let x = f*60 + (f===0 ? 35 : 30);
                        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 10);
                        c.setAttribute("fill", isRoot ? "var(--accent)" : "#18181b");
                        c.setAttribute("stroke", "var(--accent)"); fretboard.appendChild(c);

                        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute("x", x); t.setAttribute("y", y+4);
                        t.setAttribute("fill", isRoot ? "#000" : "var(--accent)");
                        t.setAttribute("class", "note-text"); t.textContent = note;
                        fretboard.appendChild(t);
                    }
                }
            });
        }

        [tuningSel, rootSel, typeSel].forEach(el => el.onchange = render);
        init();
    </script>
</body>
</html>
