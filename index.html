<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chord Vault</title>
    <style>
        :root { --line: #333; --bg: #fff; --accent: #000; }
        body { font-family: 'Courier New', Courier, monospace; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .app-container { width: 100%; max-width: 380px; background: white; border: 2px solid #000; padding: 15px; border-radius: 10px; }
        
        /* THE DIAGRAM - Styled like your photo */
        .chord-header { font-size: 28px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .tuning-labels { display: grid; grid-template-columns: repeat(6, 1fr); width: 220px; margin: 0 auto; font-weight: bold; }
        .grid-container { position: relative; width: 220px; height: 260px; margin: 10px auto; border-top: 10px solid #000; border-bottom: 2px solid #333; border-left: 2px solid #333; border-right: 2px solid #333; background-image: 
            linear-gradient(to bottom, transparent 49px, #333 50px),
            linear-gradient(to right, transparent 43px, #ccc 44px);
            background-size: 100% 52px, 44px 100%; }
        
        /* Strings (Vertical) */
        .string { position: absolute; width: 2px; height: 100%; background: #333; top: 0; }
        .s1 { left: 0%; } .s2 { left: 20%; } .s3 { left: 40%; } .s4 { left: 60%; } .s5 { left: 80%; } .s6 { left: 100%; }

        /* Finger Dots */
        .finger { width: 26px; height: 26px; background: #000; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; z-index: 5; }
        .marker-top { position: absolute; top: -35px; width: 44px; text-align: center; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* UI Controls */
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        select, input { padding: 12px; border: 2px solid #000; font-size: 16px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; background: #000; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .lib-section { margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chord-header" id="displayTitle">New Chord</div>
    
    <div class="tuning-labels" id="noteLabels">
        <div>E</div><div>A</div><div>D</div><div>G</div><div>B</div><div>E</div>
    </div>

    <div class="grid-container" id="fretboard" onclick="handleBoardClick(event)">
        <div class="string s1"></div><div class="string s2"></div><div class="string s3"></div>
        <div class="string s4"></div><div class="string s5"></div><div class="string s6"></div>
        <div id="fingerContainer"></div>
        <div id="statusContainer"></div>
    </div>

    <div class="controls">
        <label>Select Tuning:</label>
        <select id="tuningSelect" onchange="updateTuning()">
            <option value="E,A,D,G,B,E">Standard</option>
            <option value="D,A,D,G,B,E">Drop D</option>
            <option value="D,A,D,G,A,D">DADGAD</option>
            <option value="C,G,C,G,C,E">Open C</option>
        </select>

        <input type="text" id="chordInput" placeholder="Chord Name (e.g. G13)">
        <button onclick="saveToLibrary()">Save to Library</button>
        
        <div class="lib-section">
            <label>My Chord Library:</label>
            <select id="chordLibrary" onchange="loadFromLibrary()">
                <option value="">-- Choose a Saved Chord --</option>
            </select>
        </div>
        <button style="background:#555" onclick="clearBoard()">Reset Board</button>
    </div>
</div>

<script>
    let currentFingers = []; // Objects: {s: 0-5, f: 1-5}
    let stringStatus = [0,0,0,0,0,0]; // 0=none, 1=open(O), 2=mute(X)
    let tuning = ["E","A","D","G","B","E"];
    let library = JSON.parse(localStorage.getItem('guitar_vault')) || [];

    function updateTuning() {
        tuning = document.getElementById('tuningSelect').value.split(',');
        render();
    }

    function handleBoardClick(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const s = Math.round(x / (rect.width / 5));
        const f = Math.ceil(y / (rect.height / 5));

        if (y < 0) { // Top area click for O/X
            stringStatus[s] = (stringStatus[s] + 1) % 3;
        } else {
            // Toggle finger
            const existing = currentFingers.findIndex(dot => dot.s === s && dot.f === f);
            if (existing > -1) currentFingers.splice(existing, 1);
            else currentFingers.push({s, f});
        }
        render();
    }

    function render() {
        // Render Note Labels
        const labels = document.getElementById('noteLabels');
        labels.innerHTML = tuning.map(n => `<div>${n}</div>`).join('');

        // Render O/X Markers
        const status = document.getElementById('statusContainer');
        status.innerHTML = stringStatus.map((stat, i) => {
            let txt = stat === 1 ? '○' : (stat === 2 ? '×' : '');
            return `<div class="marker-top" style="left:${(i*20)-10}%" onclick="toggleStatus(${i})">${txt}</div>`;
        }).join('');

        // Render Fingers
        const container = document.getElementById('fingerContainer');
        container.innerHTML = currentFingers.map(dot => `
            <div class="finger" style="left:${dot.s*20}%; top:${(dot.f*52)-26}px"></div>
        `).join('');

        // Update Library Dropdown
        const dropdown = document.getElementById('chordLibrary');
        dropdown.innerHTML = '<option value="">-- Choose a Saved Chord --</option>' + 
            library.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
    }

    function toggleStatus(i) {
        stringStatus[i] = (stringStatus[i] + 1) % 3;
        render();
    }

    function saveToLibrary() {
        const name = document.getElementById('chordInput').value;
        if(!name) return alert("Enter a name");
        library.push({ name, fingers: [...currentFingers], status: [...stringStatus] });
        localStorage.setItem('guitar_vault', JSON.stringify(library));
        document.getElementById('chordInput').value = '';
        render();
    }

    function loadFromLibrary() {
        const idx = document.getElementById('chordLibrary').value;
        if(idx === "") return;
        const chord = library[idx];
        currentFingers = [...chord.fingers];
        stringStatus = [...chord.status];
        document.getElementById('displayTitle').innerText = chord.name;
        render();
    }

    function clearBoard() {
        currentFingers = [];
        stringStatus = [0,0,0,0,0,0];
        document.getElementById('displayTitle').innerText = "New Chord";
        render();
    }

    render();
</script>
</body>
</html>
