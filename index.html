<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTheory Pro | Clean Chord Box</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #141417;
            --accent: #00f2ff;
            --text: #ffffff;
            --fret: #27272a;
            --string: #3f3f46;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem; margin: 0;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 20px;
            width: 95%;
            max-width: 1100px;
        }

        .dashboard {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #25252a;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chord-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            color: #000;
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; }

        select {
            background: #1c1c21; color: white; border: 1px solid #333;
            padding: 12px; border-radius: 10px; cursor: pointer;
        }

        .fretboard-wrap {
            width: 100%; margin-top: 30px; background: #0d0d0f;
            padding: 50px 20px; border-radius: 24px; border: 1px solid #222;
            overflow-x: auto;
        }

        svg { width: 100%; height: auto; }
        .finger-text { font-size: 10px; font-weight: 900; text-anchor: middle; fill: #fff; }
        .mute-text { font-size: 14px; font-weight: 900; text-anchor: middle; fill: #ff4444; }
        .note-text { font-size: 10px; font-weight: 900; text-anchor: middle; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 6px; font-weight: 200; margin-bottom: 20px;">STRING<span style="color:var(--accent); font-weight:900;">THEORY</span></h1>

    <div class="main-layout">
        <div class="dashboard">
            <div class="control-group">
                <label>Tuning Selection</label>
                <select id="tuningSelect">
                    <optgroup label="Standard/Drop">
                        <option value="E2,A2,D3,G3,B3,E4">Standard E</option>
                        <option value="Eb2,Ab2,Db3,Gb3,Bb3,Eb4">Eb Standard</option>
                        <option value="D2,A2,D3,G3,B3,E4">Drop D</option>
                        <option value="C2,G2,C3,F3,A3,D4">Drop C</option>
                    </optgroup>
                    <optgroup label="Open/Modal">
                        <option value="D2,A2,D3,F#3,A3,D4">Open D</option>
                        <option value="D2,G2,D3,G3,B3,D4">Open G</option>
                        <option value="D2,A2,D3,G3,A3,D4">DADGAD</option>
                    </optgroup>
                </select>
            </div>
            <div class="control-group">
                <label>Key</label>
                <select id="rootSelect"></select>
            </div>
            <div class="control-group" style="grid-column: span 2;">
                <label>Chord Library</label>
                <select id="typeSelect">
                    <option value="Major">Major</option>
                    <option value="Minor">Minor</option>
                    <option value="7">Dominant 7</option>
                    <option value="Maj7">Major 7</option>
                    <option value="m7">Minor 7</option>
                    <option value="sus2">Sus2</option>
                    <option value="sus4">Sus4</option>
                </select>
            </div>
        </div>

        <div class="chord-card">
            <div id="chordName" style="font-weight: 900; font-size: 1.2rem; margin-bottom: 10px;">C Major</div>
            <svg id="chordBox" width="160" height="200" viewBox="0 0 100 120"></svg>
            <div style="font-size: 9px; color: #888; margin-top: 5px;">(Fingers 1-4)</div>
        </div>
    </div>

    <div class="fretboard-wrap">
        <svg id="fretboard" viewBox="0 0 1000 160" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        // Accurate Shape Data: -1 = Mute, 0 = Open, {f: fret, n: finger}
        const SHAPES = {
            "C Major": [-1, {f:3,n:3}, {f:2,n:2}, 0, {f:1,n:1}, 0],
            "C Minor": [-1, {f:3,n:3}, {f:5,n:4}, {f:5,n:4}, {f:4,n:2}, {f:3,n:1}],
            "G Major": [{f:3,n:3}, {f:2,n:2}, 0, 0, 0, {f:3,n:4}],
            "G Minor": [{f:3,n:1}, {f:5,n:3}, {f:5,n:4}, {f:3,n:1}, {f:3,n:1}, {f:3,n:1}],
            "E Major": [0, {f:2,n:2}, {f:2,n:3}, {f:1,n:1}, 0, 0],
            "E Minor": [0, {f:2,n:2}, {f:2,n:3}, 0, 0, 0],
            "A Major": [-1, 0, {f:2,n:1}, {f:2,n:2}, {f:2,n:3}, 0],
            "A Minor": [-1, 0, {f:2,n:2}, {f:2,n:3}, {f:1,n:1}, 0],
            "D Major": [-1, -1, 0, {f:2,n:1}, {f:3,n:3}, {f:2,n:2}],
            "D Minor": [-1, -1, 0, {f:2,n:2}, {f:3,n:3}, {f:1,n:1}],
            "Barre Major": [{f:1,n:1}, {f:3,n:3}, {f:3,n:4}, {f:2,n:2}, {f:1,n:1}, {f:1,n:1}]
        };

        const tuningSel = document.getElementById('tuningSelect');
        const rootSel = document.getElementById('rootSelect');
        const typeSel = document.getElementById('typeSelect');
        const chordBox = document.getElementById('chordBox');
        const fretboard = document.getElementById('fretboard');

        function init() {
            NOTES.forEach(n => rootSel.add(new Option(n, n)));
            rootSel.value = "C";
            [tuningSel, rootSel, typeSel].forEach(el => el.onchange = render);
            render();
        }

        function render() {
            const tuning = tuningSel.value.split(',').reverse();
            const root = rootSel.value;
            const type = typeSel.value;
            const isStandard = tuningSel.value.startsWith("E2,A2");
            
            document.getElementById('chordName').innerText = `${root} ${type}`;
            
            drawFretboard(tuning, root, type);
            drawChordBox(root, type, isStandard, tuning);
        }

        function drawChordBox(root, type, isStandard, tuning) {
            chordBox.innerHTML = '';
            // Draw Grid
            for(let i=0; i<6; i++) {
                let x = 15 + i*14;
                let s = document.createElementNS("http://www.w3.org/2000/svg", "line");
                s.setAttribute("x1", x); s.setAttribute("y1", 20); s.setAttribute("x2", x); s.setAttribute("y2", 100);
                s.setAttribute("stroke", "#ddd"); chordBox.appendChild(s);
            }
            for(let i=0; i<6; i++) {
                let y = 20 + i*16;
                let f = document.createElementNS("http://www.w3.org/2000/svg", "line");
                f.setAttribute("x1", 15); f.setAttribute("y1", y); f.setAttribute("x2", 85); f.setAttribute("y2", y);
                f.setAttribute("stroke", "#000"); f.setAttribute("stroke-width", i===0?4:1);
                chordBox.appendChild(f);
            }

            // Logic: Pick a shape
            let shape = SHAPES[`${root} ${type}`] || SHAPES["Barre Major"];
            
            // Special Logic: If Open G tuning and Major Chord, show the Barre at 0
            if (tuningSel.value.includes("D2,G2,D3,G3") && type === "Major") {
                shape = [0,0,0,0,0,0];
            }

            shape.forEach((pos, sIdx) => {
                let x = 15 + sIdx*14;
                if(pos === -1) {
                    let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", x); t.setAttribute("y", 15); t.setAttribute("class", "mute-text");
                    t.textContent = "×"; chordBox.appendChild(t);
                } else if (pos === 0) {
                    let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    c.setAttribute("cx", x); c.setAttribute("cy", 12); c.setAttribute("r", 3.5);
                    c.setAttribute("fill", "none"); c.setAttribute("stroke", "#000");
                    chordBox.appendChild(c);
                } else {
                    let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    dot.setAttribute("cx", x); dot.setAttribute("cy", 20 + pos.f*16 - 8);
                    dot.setAttribute("r", 6); dot.setAttribute("fill", "#000");
                    chordBox.appendChild(dot);
                    let fT = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    fT.setAttribute("x", x); fT.setAttribute("y", 20 + pos.f*16 - 5);
                    fT.setAttribute("class", "finger-text"); fT.textContent = pos.n;
                    chordBox.appendChild(fT);
                }
            });
        }

        function drawFretboard(tuning, root, type) {
            fretboard.innerHTML = '';
            const intervals = (type === "Minor") ? [0, 3, 7] : [0, 4, 7];
            const targets = intervals.map(i => NOTES[(NOTES.indexOf(root) + i) % 12]);
            const height = tuning.length * 24 + 40;
            fretboard.setAttribute("viewBox", `0 0 1000 ${height}`);

            for(let f=0; f<=15; f++) {
                let x = f*60 + 60;
                let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", x); l.setAttribute("y1", 20); l.setAttribute("x2", x); l.setAttribute("y2", height-20);
                l.setAttribute("stroke", f===0?"#fff":"#333"); fretboard.appendChild(l);
            }

            tuning.forEach((sNote, sIdx) => {
                let y = sIdx * 24 + 30;
                let sLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                sLine.setAttribute("x1", 60); sLine.setAttribute("y1", y); sLine.setAttribute("x2", 960); sLine.setAttribute("y2", y);
                sLine.setAttribute("stroke", "#444"); fretboard.appendChild(sLine);
                let startIdx = NOTES.indexOf(sNote.replace(/[0-9]/g, ''));
                for(let f=0; f<=15; f++) {
                    let note = NOTES[(startIdx + f) % 12];
                    if(targets.includes(note)) {
                        let isRoot = note === root;
                        let x = f*60 + (f===0 ? 35 : 30);
                        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 10);
                        c.setAttribute("fill", isRoot ? "var(--accent)" : "#18181b");
                        c.setAttribute("stroke", "var(--accent)"); fretboard.appendChild(c);
                        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute("x", x); t.setAttribute("y", y+4);
                        t.setAttribute("fill", isRoot ? "#000" : "var(--accent)");
                        t.setAttribute("class", "note-text"); t.textContent = note;
                        fretboard.appendChild(t);
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
