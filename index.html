<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StringTheory Pro | Ultimate Chord Library</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --gold: #fbbf24; --text: #f8fafc; --fret: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        .header { padding: 40px; text-align: center; }
        .header h1 { margin: 0; letter-spacing: 4px; font-weight: 900; }
        .header span { color: var(--gold); }

        /* Dashboard Layout */
        .app-container {
            display: grid; grid-template-columns: 350px 1fr;
            gap: 20px; width: 95%; max-width: 1400px; height: 80vh;
        }

        /* Searchable Table */
        .sidebar {
            background: var(--card); border-radius: 12px;
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #334155;
        }
        .search-box { padding: 15px; background: #0f172a; }
        .search-box input {
            width: 100%; padding: 10px; border-radius: 6px; border: none;
            background: #1e293b; color: white; box-sizing: border-box;
        }
        .chord-table-wrapper { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; cursor: pointer; }
        th { position: sticky; top: 0; background: #334155; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 12px 10px; border-bottom: 1px solid #334155; font-size: 14px; }
        tr:hover { background: #334155; }
        tr.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Main Viewport */
        .main-view {
            display: flex; flex-direction: column; gap: 20px;
        }
        .fretboard-card {
            background: #1a1a1a; padding: 40px; border-radius: 12px;
            border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .tuning-ctrls {
            display: flex; gap: 15px; background: var(--card);
            padding: 15px; border-radius: 12px; align-items: center;
        }
        select { background: #0f172a; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; }

        /* SVG Fretboard Styling */
        .fret-line { stroke: var(--fret); stroke-width: 3; }
        .string-line { stroke: #64748b; }
        .marker { fill: var(--gold); filter: drop-shadow(0 0 5px var(--gold)); }
        .note-label { fill: #000; font-size: 11px; font-weight: 900; text-anchor: middle; }
        .string-label { fill: var(--text); font-size: 14px; text-anchor: middle; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STRING<span>THEORY</span> PRO</h1>
        <p>Dynamic Multi-Tuning Chord Engine</p>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="chordSearch" placeholder="Search chords (e.g. 'm7', 'sus')...">
            </div>
            <div class="chord-table-wrapper">
                <table id="chordTable">
                    <thead>
                        <tr><th>Chord Type</th><th>Intervals</th></tr>
                    </thead>
                    <tbody id="chordTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="main-view">
            <div class="tuning-ctrls">
                <label>Root:</label>
                <select id="rootNode"></select>
                <label>Tuning:</label>
                <select id="tuningMode">
                    <option value="E2,A2,D3,G3,B3,E4">Standard (EADGBE)</option>
                    <option value="D2,A2,D3,G3,B3,E4">Drop D</option>
                    <option value="D2,G2,D3,G3,B3,D4">Open G</option>
                    <option value="E2,B2,E3,G#3,B3,E4">Open E</option>
                    <option value="D2,A2,D3,G3,A3,D4">DADGAD</option>
                </select>
                <div id="chordDisplay" style="margin-left: auto; font-weight: bold; color: var(--gold);">C Major</div>
            </div>

            <div class="fretboard-card">
                <svg id="neck" viewBox="0 0 900 180"></svg>
            </div>
        </div>
    </div>

    <script>
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const MASTER_CHORDS = {
            "Major": [0, 4, 7], "Minor": [0, 3, 7], "5 (Power)": [0, 7],
            "7 (Dominant)": [0, 4, 7, 10], "Maj7": [0, 4, 7, 11], "m7": [0, 3, 7, 10],
            "sus2": [0, 2, 7], "sus4": [0, 5, 7], "dim": [0, 3, 6], "aug": [0, 4, 8],
            "add9": [0, 4, 7, 14], "9": [0, 4, 7, 10, 14], "11": [0, 4, 7, 10, 14, 17],
            "13": [0, 4, 7, 10, 14, 17, 21], "m7b5": [0, 3, 6, 10], "7#9": [0, 4, 7, 10, 15]
        };

        let currentRoot = "C";
        let currentType = "Major";

        // Build UI Components
        function init() {
            const rootSel = document.getElementById('rootNode');
            NOTES.forEach(n => rootSel.add(new Option(n, n)));
            
            renderTable();
            drawNeck();
        }

        function renderTable(filter = "") {
            const tbody = document.getElementById('chordTableBody');
            tbody.innerHTML = '';
            Object.entries(MASTER_CHORDS).forEach(([name, intervals]) => {
                if (name.toLowerCase().includes(filter.toLowerCase())) {
                    const tr = document.createElement('tr');
                    if (name === currentType) tr.className = 'active';
                    tr.innerHTML = `<td>${name}</td><td style="color:#94a3b8; font-size:11px">${intervals.join('-')}</td>`;
                    tr.onclick = () => {
                        currentType = name;
                        document.querySelectorAll('tr').forEach(r => r.classList.remove('active'));
                        tr.classList.add('active');
                        update();
                    };
                    tbody.appendChild(tr);
                }
            });
        }

        function drawNeck() {
            const svg = document.getElementById('neck');
            svg.innerHTML = '';
            const tuning = document.getElementById('tuningMode').value.split(',').reverse();
            const targetNotes = MASTER_CHORDS[currentType].map(i => NOTES[(NOTES.indexOf(currentRoot) + i) % 12]);
            
            // Draw Frets (0 to 14)
            for (let f = 0; f <= 14; f++) {
                let x = f * 60 + 50;
                let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", x); l.setAttribute("y1", 20);
                l.setAttribute("x2", x); l.setAttribute("y2", 160);
                l.setAttribute("class", "fret-line");
                svg.appendChild(l);
            }

            // Draw Strings & Notes
            tuning.forEach((start, sIdx) => {
                let y = sIdx * 28 + 20;
                let sLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                sLine.setAttribute("x1", 50); sLine.setAttribute("y1", y);
                sLine.setAttribute("x2", 890); sLine.setAttribute("y2", y);
                sLine.setAttribute("class", "string-line");
                sLine.style.strokeWidth = (1 + sIdx * 0.5);
                svg.appendChild(sLine);

                // String Start Note Label
                let sLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                sLabel.setAttribute("x", 25); sLabel.setAttribute("y", y + 5);
                sLabel.setAttribute("class", "string-label");
                sLabel.textContent = start.replace(/\d/g, '');
                svg.appendChild(sLabel);

                let startIdx = NOTES.indexOf(start.replace(/\d/g, ''));
                for (let f = 0; f <= 14; f++) {
                    let note = NOTES[(startIdx + f) % 12];
                    if (targetNotes.includes(note)) {
                        let dotX = f === 0 ? 50 : (f * 60 + 20);
                        let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        circle.setAttribute("cx", dotX); circle.setAttribute("cy", y);
                        circle.setAttribute("r", f === 0 ? 12 : 10);
                        circle.setAttribute("class", "marker");
                        if (f === 0) circle.style.fill = "white"; // Highlight open strings differently
                        svg.appendChild(circle);

                        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute("x", dotX); t.setAttribute("y", y + 4);
                        t.setAttribute("class", "note-label");
                        t.textContent = note;
                        svg.appendChild(t);
                    }
                }
            });
        }

        function update() {
            currentRoot = document.getElementById('rootNode').value;
            document.getElementById('chordDisplay').innerText = `${currentRoot} ${currentType}`;
            drawNeck();
        }

        document.getElementById('chordSearch').oninput = (e) => renderTable(e.target.value);
        document.getElementById('rootNode').onchange = update;
        document.getElementById('tuningMode').onchange = update;

        init();
    </script>
</body>
</html>
