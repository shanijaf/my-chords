<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTheory | Pro Chord Lab</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #ffcc00;
            --text: #e0e0e0;
            --fret: #555;
            --string: #888;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid #333;
            align-items: flex-end;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; color: var(--string); text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        select, button {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
        }

        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
        }

        button:hover { background: #e6b800; transform: translateY(-1px); }
        select:focus { border-color: var(--accent); }

        .fretboard-container {
            width: 100%;
            max-width: 1100px;
            overflow-x: auto;
            background: #1a1a1a;
            padding: 50px 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        svg { width: 100%; height: auto; min-width: 900px; }
        .fret-line { stroke: var(--fret); stroke-width: 2; }
        .nut-line { stroke: #fff; stroke-width: 6; }
        .string-line { stroke: var(--string); }
        .note-marker { fill: var(--accent); }
        .root-marker { fill: #1a1a1a; stroke: var(--accent); stroke-width: 3; }
        .note-text { fill: #000; font-size: 10px; font-weight: 800; text-anchor: middle; }
        .root-text { fill: var(--accent); }
        .string-label { fill: var(--string); font-size: 11px; text-anchor: end; font-weight: bold; }
        
        h1 { margin: 0 0 20px 0; font-weight: 300; letter-spacing: 4px; font-size: 1.5rem; }
        span.gold { color: var(--accent); font-weight: 800; }
    </style>
</head>
<body>

    <h1>STRING<span class="gold">THEORY</span></h1>

    <div class="controls">
        <div class="control-group">
            <label>Root Note</label>
            <select id="rootSelect"></select>
        </div>
        <div class="control-group">
            <label>Chord Type</label>
            <select id="typeSelect"></select>
        </div>
        <div class="control-group">
            <label>Tuning</label>
            <select id="tuningSelect">
                <option value="E2,A2,D3,G3,B3,E4">Standard (EADGBE)</option>
                <option value="D2,A2,D3,G3,B3,E4">Drop D</option>
                <option value="D2,G2,D3,G3,B3,D4">Open G</option>
                <option value="C2,G2,C3,G3,C4,E4">Open C</option>
            </select>
        </div>
        <div class="control-group">
            <label>Capo</label>
            <select id="capoSelect"><option value="0">None</option></select>
        </div>
        <button id="saveBtn">Export PNG</button>
    </div>

    <div class="fretboard-container" id="captureArea">
        <svg id="fretboard" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CHORD_DEFS = {
            "Major": [0, 4, 7], "Minor": [0, 3, 7], "7th": [0, 4, 7, 10],
            "Major 7": [0, 4, 7, 11], "Minor 7": [0, 3, 7, 10], "Sus4": [0, 5, 7],
            "Dim": [0, 3, 6], "9th": [0, 4, 7, 10, 14]
        };

        const rootSelect = document.getElementById('rootSelect');
        const typeSelect = document.getElementById('typeSelect');
        const tuningSelect = document.getElementById('tuningSelect');
        const capoSelect = document.getElementById('capoSelect');
        const saveBtn = document.getElementById('saveBtn');
        const svg = document.getElementById('fretboard');

        NOTES.forEach(n => rootSelect.add(new Option(n, n)));
        Object.keys(CHORD_DEFS).forEach(c => typeSelect.add(new Option(c, c)));
        for(let i=1; i<=12; i++) capoSelect.add(new Option(`Fret ${i}`, i));
        
        rootSelect.value = "C";

        function draw() {
            svg.innerHTML = '';
            // Background for the export
            let bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bg.setAttribute("width", "100%"); bg.setAttribute("height", "100%"); bg.setAttribute("fill", "#1a1a1a");
            svg.appendChild(bg);

            const tuning = tuningSelect.value.split(',').reverse();
            const root = rootSelect.value;
            const type = typeSelect.value;
            const capo = parseInt(capoSelect.value);
            const targetNotes = CHORD_DEFS[type].map(i => NOTES[(NOTES.indexOf(root) + i) % 12]);
            const numFrets = 15; const fretWidth = 60; const margin = 80;

            for (let i = 0; i <= numFrets; i++) {
                let x = i * fretWidth + margin;
                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x); line.setAttribute("y1", 20); line.setAttribute("x2", x); line.setAttribute("y2", 160);
                line.setAttribute("stroke", i === capo ? "#ffffff" : "#555");
                line.setAttribute("stroke-width", i === capo ? "6" : "2");
                svg.appendChild(line);
            }

            tuning.forEach((startNoteStr, sIdx) => {
                let y = sIdx * 28 + 20;
                let openNoteName = startNoteStr.replace(/[0-9]/g, '');
                let stringRootIdx = NOTES.indexOf(openNoteName);

                let sLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                sLine.setAttribute("x1", margin); sLine.setAttribute("y1", y);
                sLine.setAttribute("x2", (numFrets * fretWidth) + margin); sLine.setAttribute("y2", y);
                sLine.setAttribute("stroke", "#888"); sLine.setAttribute("stroke-width", 1 + sIdx/1.5);
                svg.appendChild(sLine);

                let tLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                tLabel.setAttribute("x", margin - 20); tLabel.setAttribute("y", y + 4);
                tLabel.setAttribute("fill", "#888"); tLabel.setAttribute("font-size", "11px"); tLabel.setAttribute("text-anchor", "end");
                tLabel.textContent = NOTES[(stringRootIdx + capo) % 12];
                svg.appendChild(tLabel);

                for (let f = 0; f <= numFrets; f++) {
                    if (f < capo) continue;
                    let noteAtFret = NOTES[(stringRootIdx + f) % 12];
                    if (targetNotes.includes(noteAtFret)) {
                        let isRoot = noteAtFret === root;
                        let x = f * fretWidth + (f === capo ? margin - 25 : margin - (fretWidth/2));
                        
                        let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        circle.setAttribute("cx", x); circle.setAttribute("cy", y);
                        circle.setAttribute("r", f === capo ? 9 : 12);
                        circle.setAttribute("fill", isRoot && f !== capo ? "#1a1a1a" : "#ffcc00");
                        if(isRoot && f !== capo) { circle.setAttribute("stroke", "#ffcc00"); circle.setAttribute("stroke-width", "3"); }
                        if(f === capo) { circle.setAttribute("fill", "none"); circle.setAttribute("stroke", "#ffcc00"); circle.setAttribute("stroke-width", "2"); }
                        svg.appendChild(circle);

                        let txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        txt.setAttribute("x", x); txt.setAttribute("y", y + 4);
                        txt.setAttribute("fill", isRoot && f !== capo ? "#ffcc00" : "#000");
                        if (f === capo) txt.setAttribute("fill", "white");
                        txt.setAttribute("font-size", "10px"); txt.setAttribute("font-weight", "bold"); txt.setAttribute("text-anchor", "middle");
                        txt.textContent = noteAtFret;
                        svg.appendChild(txt);
                    }
                }
            });
        }

        saveBtn.onclick = () => {
            const svgData = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const img = new Image();
            const svgBlob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(svgBlob);

            img.onload = () => {
                canvas.width = 2000; // High res
                canvas.height = 360;
                ctx.drawImage(img, 0, 0, 2000, 360);
                const png = canvas.toDataURL("image/png");
                const downloadLink = document.createElement("a");
                downloadLink.href = png;
                downloadLink.download = `${rootSelect.value}_${typeSelect.value}_Capo${capoSelect.value}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        };

        [rootSelect, typeSelect, tuningSelect, capoSelect].forEach(el => el.onchange = draw);
        draw();
    </script>
</body>
</html>
