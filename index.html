<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTheory Pro | Dual-Box Engine</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #141417;
            --accent: #00f2ff;
            --text: #ffffff;
            --fret: #27272a;
            --string: #3f3f46;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem; margin: 0;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 95%;
            max-width: 1100px;
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 20px;
        }

        .dashboard {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #25252a;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chord-display-area {
            display: flex;
            gap: 15px;
        }

        .chord-card {
            background: #ffffff;
            padding: 15px;
            border-radius: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #000;
        }

        .card-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #888; margin-bottom: 5px; }
        .chord-name { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; height: 1.2em; text-align: center;}

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; }

        select {
            background: #1c1c21; color: white; border: 1px solid #333;
            padding: 10px; border-radius: 8px; cursor: pointer;
        }

        .fretboard-wrap {
            width: 100%; margin-top: 20px; background: #0d0d0f;
            padding: 40px 20px; border-radius: 24px; border: 1px solid #222;
            overflow-x: auto;
        }

        svg { width: 100%; height: auto; }
        .finger-text { font-size: 10px; font-weight: 900; text-anchor: middle; fill: #fff; }
        .mute-text { font-size: 14px; font-weight: 900; text-anchor: middle; fill: #ff4444; }
        .note-text { font-size: 10px; font-weight: 900; text-anchor: middle; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 6px; font-weight: 200; margin-bottom: 20px;">STRING<span style="color:var(--accent); font-weight:900;">THEORY</span></h1>

    <div class="main-layout">
        <div class="top-row">
            <div class="dashboard">
                <div class="control-group">
                    <label>Guitar Tuning</label>
                    <select id="tuningSelect">
                        <option value="E2,A2,D3,G3,B3,E4">Standard E</option>
                        <option value="D2,A2,D3,G3,B3,E4">Drop D</option>
                        <option value="D2,G2,D3,G3,B3,D4">Open G</option>
                        <option value="D2,A2,D3,F#3,A3,D4">Open D</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Capo Position</label>
                    <select id="capoSelect">
                        <option value="0">No Capo</option>
                    </select>
                </div>
                <div class="control-group" style="grid-column: span 2;">
                    <label>Muscle Memory (Hand Shape)</label>
                    <select id="shapeSelect">
                        <option value="C Major">C Shape</option>
                        <option value="G Major">G Shape</option>
                        <option value="E Major">E Shape</option>
                        <option value="E Minor">Em Shape</option>
                        <option value="A Major">A Shape</option>
                        <option value="A Minor">Am Shape</option>
                        <option value="D Major">D Shape</option>
                    </select>
                </div>
            </div>

            <div class="chord-display-area">
                <div class="chord-card">
                    <div class="card-label">Your Hand Shape</div>
                    <div id="shapeName" class="chord-name">C Shape</div>
                    <svg id="boxShape" width="130" height="160" viewBox="0 0 100 120"></svg>
                </div>
                <div class="chord-card" style="border: 2px solid var(--accent);">
                    <div class="card-label" style="color:var(--accent)">Actual Resulting Chord</div>
                    <div id="actualName" class="chord-name">C Major</div>
                    <svg id="boxActual" width="130" height="160" viewBox="0 0 100 120"></svg>
                </div>
            </div>
        </div>

        <div class="fretboard-wrap">
            <svg id="fretboard" viewBox="0 0 1000 160" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
    </div>

    <script>
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const SHAPES = {
            "C Major": { root: "C", pat: [-1, {f:3,n:3}, {f:2,n:2}, 0, {f:1,n:1}, 0] },
            "G Major": { root: "G", pat: [{f:3,n:3}, {f:2,n:2}, 0, 0, 0, {f:3,n:4}] },
            "E Major": { root: "E", pat: [0, {f:2,n:2}, {f:2,n:3}, {f:1,n:1}, 0, 0] },
            "E Minor": { root: "E", pat: [0, {f:2,n:2}, {f:2,n:3}, 0, 0, 0] },
            "A Major": { root: "A", pat: [-1, 0, {f:2,n:1}, {f:2,n:2}, {f:2,n:3}, 0] },
            "A Minor": { root: "A", pat: [-1, 0, {f:2,n:2}, {f:2,n:3}, {f:1,n:1}, 0] },
            "D Major": { root: "D", pat: [-1, -1, 0, {f:2,n:1}, {f:3,n:3}, {f:2,n:2}] }
        };

        const tuningSel = document.getElementById('tuningSelect');
        const capoSel = document.getElementById('capoSelect');
        const shapeSel = document.getElementById('shapeSelect');

        function init() {
            for(let i=1; i<=10; i++) capoSel.add(new Option(`Fret ${i}`, i));
            [tuningSel, capoSel, shapeSel].forEach(el => el.onchange = render);
            render();
        }

        function drawBox(svgId, pattern, isResultant) {
            const svg = document.getElementById(svgId);
            svg.innerHTML = '';
            // Draw Grid
            for(let i=0; i<6; i++) {
                let x = 15 + i*14;
                let s = document.createElementNS("http://www.w3.org/2000/svg", "line");
                s.setAttribute("x1", x); s.setAttribute("y1", 20); s.setAttribute("x2", x); s.setAttribute("y2", 100);
                s.setAttribute("stroke", "#ddd"); svg.appendChild(s);
            }
            for(let i=0; i<6; i++) {
                let y = 20 + i*16;
                let f = document.createElementNS("http://www.w3.org/2000/svg", "line");
                f.setAttribute("x1", 15); f.setAttribute("y1", y); f.setAttribute("x2", 85); f.setAttribute("y2", y);
                f.setAttribute("stroke", "#000"); f.setAttribute("stroke-width", i===0?4:1);
                svg.appendChild(f);
            }

            pattern.forEach((pos, sIdx) => {
                let x = 15 + sIdx*14;
                if(pos === -1) {
                    let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", x); t.setAttribute("y", 15); t.setAttribute("class", "mute-text"); t.textContent = "×"; 
                    svg.appendChild(t);
                } else if (pos === 0 || (typeof pos === 'object' && pos.f === 0)) {
                    let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    c.setAttribute("cx", x); c.setAttribute("cy", 12); c.setAttribute("r", 3.5);
                    c.setAttribute("fill", "none"); c.setAttribute("stroke", "#000");
                    svg.appendChild(c);
                } else {
                    let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    dot.setAttribute("cx", x); dot.setAttribute("cy", 20 + pos.f*16 - 8);
                    dot.setAttribute("r", 6); dot.setAttribute("fill", isResultant ? "#00f2ff" : "#000");
                    svg.appendChild(dot);
                    let fT = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    fT.setAttribute("x", x); fT.setAttribute("y", 20 + pos.f*16 - 5);
                    fT.setAttribute("class", "finger-text"); 
                    fT.setAttribute("fill", isResultant ? "#000" : "#fff");
                    fT.textContent = pos.n || "";
                    svg.appendChild(fT);
                }
            });
        }

        function render() {
            const tuning = tuningSel.value.split(',').reverse();
            const capo = parseInt(capoSel.value);
            const shapeData = SHAPES[shapeSel.value];
            
            // Draw Shape Box (Static hand memory)
            drawBox('boxShape', shapeData.pat, false);
            document.getElementById('shapeName').innerText = shapeSel.value;

            // Calculate Resultant Chord
            // We find the notes being played: Tuning note + Capo + Shape Fret
            let activeNotes = [];
            shapeData.pat.forEach((pos, sIdx) => {
                if(pos !== -1) {
                    let stringRoot = NOTES.indexOf(tuning[sIdx].replace(/[0-9]/g, ''));
                    let fret = (typeof pos === 'object') ? pos.f : 0;
                    activeNotes.push(NOTES[(stringRoot + capo + fret) % 12]);
                }
            });

            // Very basic naming logic (Simplified for display)
            const baseIdx = NOTES.indexOf(shapeData.root);
            const actualRoot = NOTES[(baseIdx + capo) % 12];
            const isMinor = shapeSel.value.includes("Minor");
            const resultName = actualRoot + (isMinor ? "m" : "") + (tuningSel.value !== "E2,A2,D3,G3,B3,E4" ? "*" : "");
            
            document.getElementById('actualName').innerText = resultName;
            drawBox('boxActual', shapeData.pat, true);
            
            // Draw Fretboard
            drawFretboard(tuning, activeNotes, capo);
        }

        function drawFretboard(tuning, targets, capo) {
            fretboard.innerHTML = '';
            for(let f=0; f<=15; f++) {
                let x = f*60 + 60;
                let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", x); l.setAttribute("y1", 20); l.setAttribute("x2", x); l.setAttribute("y2", 140);
                l.setAttribute("stroke", f === capo ? "#fff" : "#333");
                l.setAttribute("stroke-width", f === capo ? 5 : 1);
                fretboard.appendChild(l);
            }
            tuning.forEach((sNote, sIdx) => {
                let y = sIdx * 24 + 30;
                let startIdx = NOTES.indexOf(sNote.replace(/[0-9]/g, ''));
                for(let f=0; f<=15; f++) {
                    if (f < capo) continue;
                    let note = NOTES[(startIdx + f) % 12];
                    if(targets.includes(note)) {
                        let x = f*60 + (f===capo ? 35 : 30);
                        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 10);
                        c.setAttribute("fill", "#18181b"); c.setAttribute("stroke", "var(--accent)");
                        fretboard.appendChild(c);
                        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute("x", x); t.setAttribute("y", y+4); t.setAttribute("fill", "var(--accent)");
                        t.setAttribute("class", "note-text"); t.textContent = note;
                        fretboard.appendChild(t);
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
