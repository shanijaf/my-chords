<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTheory Pro | Dynamic Chord Lab</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #141417;
            --accent: #00f2ff;
            --text: #ffffff;
            --fret: #27272a;
            --string: #3f3f46;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem; margin: 0;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 2rem; letter-spacing: 5px; margin: 0; font-weight: 200; }
        .header span { color: var(--accent); font-weight: 900; }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
        }

        .dashboard {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #25252a;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .chord-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            color: #000;
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        select, button {
            background: #1c1c21; color: white; border: 1px solid #333;
            padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px;
        }

        .fretboard-wrap {
            width: 100%; margin-top: 30px; background: #0d0d0f;
            padding: 50px 20px; border-radius: 24px; border: 1px solid #222;
            overflow-x: auto;
        }

        svg { width: 100%; height: auto; min-width: 1000px; }
        .note-circle { transition: all 0.3s ease; }
        .note-text { font-size: 10px; font-weight: 900; text-anchor: middle; pointer-events: none; }
        .mute-text { font-size: 14px; font-weight: 900; text-anchor: middle; fill: #ff4444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STRING<span>THEORY</span></h1>
        <p style="color: #71717a; font-size: 0.8rem; margin: 5px 0 0 0;">Dynamic Tuning & Chord Synthesis</p>
    </div>

    <div class="app-container">
        <div class="dashboard">
            <div class="control-group">
                <label>Tuning Family</label>
                <select id="tuningSelect">
                    <optgroup label="Standard & Drop">
                        <option value="E2,A2,D3,G3,B3,E4">Standard E</option>
                        <option value="D2,A2,D3,G3,B3,E4">Drop D</option>
                        <option value="C2,G2,C3,F3,A3,D4">Drop C</option>
                    </optgroup>
                    <optgroup label="Open (Slide/Blues)">
                        <option value="D2,A2,D3,F#3,A3,D4">Open D</option>
                        <option value="D2,G2,D3,G3,B3,D4">Open G</option>
                        <option value="C2,G2,C3,G3,C4,E4">Open C</option>
                    </optgroup>
                    <optgroup label="Modal & Folk">
                        <option value="D2,A2,D3,G3,A3,D4">DADGAD</option>
                        <option value="D2,G2,D3,G3,C4,D4">Orkney</option>
                    </optgroup>
                </select>
            </div>
            <div class="control-group">
                <label>Root Note</label>
                <select id="rootSelect"></select>
            </div>
            <div class="control-group">
                <label>Chord Type</label>
                <select id="typeSelect">
                    <option value="Major">Major (1-3-5)</option>
                    <option value="Minor">Minor (1-b3-5)</option>
                    <option value="7">Dominant 7 (1-3-5-b7)</option>
                    <option value="Maj7">Major 7 (1-3-5-7)</option>
                    <option value="m7">Minor 7 (1-b3-5-b7)</option>
                    <option value="sus2">Sus2 (1-2-5)</option>
                    <option value="sus4">Sus4 (1-4-5)</option>
                    <option value="add9">Add9 (1-3-5-9)</option>
                    <option value="dim">Diminished</option>
                </select>
            </div>
            <div class="control-group">
                <label>Capo</label>
                <select id="capoSelect"><option value="0">Open (No Capo)</option></select>
            </div>
        </div>

        <div class="chord-card">
            <div id="chordName" style="font-weight: 900; font-size: 1.2rem;">G Major</div>
            <svg id="chordBox" width="160" height="180" viewBox="0 0 100 120"></svg>
            <div id="stringLabels" style="font-size: 9px; font-weight: bold; margin-top: 10px; color: #555;"></div>
        </div>
    </div>

    <div class="fretboard-wrap">
        <svg id="fretboard" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CHORD_FORMULAS = {
            "Major": [0, 4, 7], "Minor": [0, 3, 7], "7": [0, 4, 7, 10], "Maj7": [0, 4, 7, 11],
            "m7": [0, 3, 7, 10], "sus2": [0, 2, 7], "sus4": [0, 5, 7], "add9": [0, 4, 7, 14], "dim": [0, 3, 6]
        };

        const tuningSel = document.getElementById('tuningSelect');
        const rootSel = document.getElementById('rootSelect');
        const typeSel = document.getElementById('typeSelect');
        const capoSel = document.getElementById('capoSelect');
        const fretboard = document.getElementById('fretboard');
        const chordBox = document.getElementById('chordBox');

        function init() {
            NOTES.forEach(n => rootSel.add(new Option(n, n)));
            for(let i=1; i<=12; i++) capoSel.add(new Option(`Capo Fret ${i}`, i));
            rootSel.value = "C";
            [tuningSel, rootSel, typeSel, capoSel].forEach(el => el.onchange = render);
            render();
        }

        function render() {
            const tuning = tuningSel.value.split(',').reverse();
            const root = rootSel.value;
            const type = typeSel.value;
            const capo = parseInt(capoSel.value);
            const targetNotes = CHORD_FORMULAS[type].map(i => NOTES[(NOTES.indexOf(root) + i) % 12]);
            
            document.getElementById('chordName').innerText = `${root} ${type}`;
            document.getElementById('stringLabels').innerText = tuning.map(n => n.replace(/[0-9]/g, '')).reverse().join(' ');

            drawFretboard(tuning, root, targetNotes, capo);
            drawChordBox(tuning, root, targetNotes, capo);
        }

        function drawChordBox(tuning, root, targets, capo) {
            chordBox.innerHTML = '';
            // Basic Box Grid
            for(let i=0; i<6; i++) {
                let x = 15 + i*14;
                let s = document.createElementNS("http://www.w3.org/2000/svg", "line");
                s.setAttribute("x1", x); s.setAttribute("y1", 20); s.setAttribute("x2", x); s.setAttribute("y2", 100);
                s.setAttribute("stroke", "#ddd"); chordBox.appendChild(s);
            }
            for(let i=0; i<6; i++) {
                let y = 20 + i*16;
                let f = document.createElementNS("http://www.w3.org/2000/svg", "line");
                f.setAttribute("x1", 15); f.setAttribute("y1", y); f.setAttribute("x2", 85); f.setAttribute("y2", y);
                f.setAttribute("stroke", "#000"); f.setAttribute("stroke-width", i===0?4:1);
                chordBox.appendChild(f);
            }

            // Calculation: Find best fingering (Lowest available fret per string within a 4-fret reach)
            tuning.slice(0, 6).forEach((sNote, sIdx) => {
                let x = 15 + sIdx*14;
                let baseIdx = NOTES.indexOf(sNote.replace(/[0-9]/g, '')) + capo;
                let found = false;

                // Check 5 frets relative to the Capo
                for(let f=0; f<=5; f++) {
                    if(found) break;
                    let note = NOTES[(baseIdx + f) % 12];
                    if(targets.includes(note)) {
                        if(f === 0) {
                            let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                            c.setAttribute("cx", x); c.setAttribute("cy", 12); c.setAttribute("r", 3.5);
                            c.setAttribute("fill", "none"); c.setAttribute("stroke", "#000");
                            chordBox.appendChild(c);
                        } else {
                            let dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                            dot.setAttribute("cx", x); dot.setAttribute("cy", 20 + f*16 - 8);
                            dot.setAttribute("r", 6); dot.setAttribute("fill", note===root ? "var(--accent)" : "#000");
                            chordBox.appendChild(dot);
                        }
                        found = true;
                    }
                }
                if(!found) {
                    let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", x); t.setAttribute("y", 15); t.setAttribute("class", "mute-text");
                    t.textContent = "×"; chordBox.appendChild(t);
                }
            });
        }

        function drawFretboard(tuning, root, targets, capo) {
            fretboard.innerHTML = '';
            const height = tuning.length * 25 + 40;
            fretboard.setAttribute("viewBox", `0 0 1000 ${height}`);

            for(let f=0; f<=15; f++) {
                let x = f*60 + 60;
                let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", x); l.setAttribute("y1", 20); l.setAttribute("x2", x); l.setAttribute("y2", height-20);
                l.setAttribute("stroke", f===capo?"#fff":"var(--fret)"); l.setAttribute("stroke-width", f===capo?5:1);
                fretboard.appendChild(l);
            }

            tuning.forEach((sNote, sIdx) => {
                let y = sIdx * 25 + 30;
                let sLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                sLine.setAttribute("x1", 60); sLine.setAttribute("y1", y); sLine.setAttribute("x2", 960); sLine.setAttribute("y2", y);
                sLine.setAttribute("stroke", "var(--string)"); fretboard.appendChild(sLine);

                let startIdx = NOTES.indexOf(sNote.replace(/[0-9]/g, ''));
                for(let f=0; f<=15; f++) {
                    if (f < capo) continue;
                    let note = NOTES[(startIdx + f) % 12];
                    if(targets.includes(note)) {
                        let isRoot = note === root;
                        let x = f*60 + (f===capo ? 35 : 30);
                        let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 10);
                        c.setAttribute("fill", isRoot ? "var(--accent)" : "#18181b");
                        c.setAttribute("stroke", "var(--accent)"); fretboard.appendChild(c);

                        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute("x", x); t.setAttribute("y", y+4);
                        t.setAttribute("fill", isRoot ? "#000" : "var(--accent)");
                        t.setAttribute("class", "note-text"); t.textContent = note;
                        fretboard.appendChild(t);
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
